name: Actualizacion Automatica de Datos
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar librerias
        run: pip install requests openpyxl beautifulsoup4 lxml xlrd

      - name: Crear carpeta idecba
        run: mkdir -p idecba

      - name: Correr scripts
        run: |
          python descargar_datos.py
          python build_macro_data.py || true
          python build_pgb_rubros.py || true
          python generar_macro.py

      - name: Guardar cambios
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Auto-update: $(date +'%Y-%m-%d')" || exit 0
          git push
