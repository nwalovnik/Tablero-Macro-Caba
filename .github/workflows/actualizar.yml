name: Actualizacion Automatica de Datos
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar librerias
        run: pip install requests openpyxl beautifulsoup4 lxml xlrd

      - name: Crear carpeta idecba
        run: mkdir -p idecba

      - name: Bajar XLSX de IDECBA
        run: python descargar_datos.py

      - name: Generar macro_data.json
        run: python build_macro_data.py

      - name: Generar calendario.json + inyectar calData en HTML
        run: python build_calendario.py

      - name: PGB sectorial + IPCBA rubros + parche MACRO inline en HTML
        run: python build_pgb_rubros.py

      - name: Commit y push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --cached --quiet && echo "Sin cambios" && exit 0
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M')"
          git push
