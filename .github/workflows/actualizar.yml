name: Actualizacion Automatica de Datos
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerias
        run: pip install requests openpyxl beautifulsoup4 lxml xlrd

      - name: Crear carpeta idecba
        run: mkdir -p idecba

      - name: Correr scripts
        run: |
          # Primero ejecutamos los scripts que descargan y procesan
          python build_macro_data.py || true
          python build_pgb_rubros.py || true
          python generar_macro.py

      -- name: Correr scripts
        run: |
          python descargar_datos.py
          python build_macro_data.py || true
          python build_pgb_rubros.py || true
          python generar_macro.py
