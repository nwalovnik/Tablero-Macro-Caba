name: Actualizacion Automatica de Datos
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerias
        run: pip install requests openpyxl beautifulsoup4 lxml xlrd

      - name: Descargar Excels de IDECBA
        run: |
          mkdir -p idecba
          # Descarga el archivo de IPCBA directamente al lugar donde el script lo busca
          curl -L "https://www.estadisticaciudad.gob.ar/eyc/wp-content/uploads/2024/05/ipcba_mensual.xlsx" -o idecba/ipcba_mensual.xlsx
          # Agrega aquí otras descargas si los scripts piden más archivos (iae, canastas, etc)

      - name: Correr scripts
        run: |
          # Usamos "|| true" para que si un script falla, intente seguir con el siguiente
          python build_macro_data.py || true
          python build_pgb_rubros.py || true
          python generar_macro.py

      - name: Guardar cambios
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Auto-update: $(date +'%Y-%m-%d')" || exit 0
          git push
